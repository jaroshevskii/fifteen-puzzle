name: Release

# Builds optimized, statically-linked binaries for each platform and attaches
# them to the GitHub Release. Release builds set FIFTEEN_STATIC_DEPS=ON, so
# raylib + openal-soft are compiled from source and linked statically (a
# self-contained, faster binary) — unlike the dynamic, system-package CI builds.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS, runner: macos-latest, preset: macos, bin: FifteenPuzzle, asset: FifteenPuzzle-macos-arm64 }
          - { name: Linux, runner: ubuntu-latest, preset: linux, bin: FifteenPuzzle, asset: FifteenPuzzle-linux-x86_64 }
          - { name: Windows, runner: windows-latest, preset: windows, bin: FifteenPuzzle.exe, asset: FifteenPuzzle-windows-x86_64.exe }

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      # --- toolchains (deps are built from source, so no system raylib/openal) --
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install LLVM + libc++ + windowing deps (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y \
            clang-21 lld-21 libc++-21-dev libc++abi-21-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev

      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # --- build (static deps, Release) ----------------------------------------
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset macos -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset macos

      - name: Build (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          json=""
          for cand in $(find /usr/lib/llvm-21 /usr/lib /usr/share -name libc++.modules.json 2>/dev/null); do
            sp="$(python3 -c 'import json,sys; m=[x for x in json.load(open(sys.argv[1])).get("modules",[]) if x.get("logical-name")=="std"]; print(m[0]["source-path"] if m else "")' "$cand")"
            [ -z "$sp" ] && continue
            case "$sp" in /*) abs="$sp" ;; *) abs="$(dirname "$cand")/$sp" ;; esac
            [ -f "$abs" ] && { json="$cand"; break; }
          done
          test -n "$json"
          cmake --preset linux -DCMAKE_CXX_STDLIB_MODULES_JSON="$json" -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset linux

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake --preset windows -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset windows

      # --- package + publish ----------------------------------------------------
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "build/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
