name: Release

# Builds optimized, statically-linked binaries for each platform and attaches
# them to the GitHub Release. Release builds set FIFTEEN_STATIC_DEPS=ON, so
# raylib + openal-soft are compiled from source and linked statically (a
# self-contained, faster binary) — unlike the dynamic, system-package CI builds.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS, runner: macos-latest, preset: macos, bin: FifteenPuzzle, stem: FifteenPuzzle-macos-arm64, archive: FifteenPuzzle-macos-arm64.tar.gz }
          - { name: Linux, runner: ubuntu-latest, preset: linux, bin: FifteenPuzzle, stem: FifteenPuzzle-linux-x86_64, archive: FifteenPuzzle-linux-x86_64.tar.gz }
          - { name: Windows, runner: windows-latest, preset: windows, bin: FifteenPuzzle.exe, stem: FifteenPuzzle-windows-x86_64.exe, archive: FifteenPuzzle-windows-x86_64.zip }

    steps:
      - uses: actions/checkout@v7

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      # --- toolchains (deps are built from source, so no system raylib/openal) --
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install LLVM + libc++ + windowing deps (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          # libcurl is linked dynamically even in static builds (a from-source
          # static curl + TLS backend is out of scope); sqlite + json are
          # vendored from source by FIFTEEN_STATIC_DEPS.
          sudo apt-get install -y \
            clang-21 lld-21 libc++-21-dev libc++abi-21-dev libcurl4-openssl-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev

      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # libcurl is not in the Windows SDK; install it via vcpkg (linked
      # dynamically — the release exe needs the curl DLL alongside it).
      - name: Install curl (vcpkg, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install curl --triplet x64-windows

      # --- build (static deps, Release) ----------------------------------------
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset macos -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset macos

      - name: Build (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          json=""
          for cand in $(find /usr/lib/llvm-21 /usr/lib /usr/share -name libc++.modules.json 2>/dev/null); do
            sp="$(python3 -c 'import json,sys; m=[x for x in json.load(open(sys.argv[1])).get("modules",[]) if x.get("logical-name")=="std"]; print(m[0]["source-path"] if m else "")' "$cand")"
            [ -z "$sp" ] && continue
            case "$sp" in /*) abs="$sp" ;; *) abs="$(dirname "$cand")/$sp" ;; esac
            [ -f "$abs" ] && { json="$cand"; break; }
          done
          test -n "$json"
          cmake --preset linux -DCMAKE_CXX_STDLIB_MODULES_JSON="$json" -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset linux

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake --preset windows -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build --preset windows

      # --- package + publish ----------------------------------------------------
      # Archive the binary so the executable bit survives download/extraction.
      # A bare binary served over HTTP loses its +x and macOS shows it as a
      # "Document" that won't run; tar.gz (and zip on Windows) preserve it.
      - name: Package (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "build/${{ matrix.bin }}" "${{ matrix.stem }}"
          chmod +x "${{ matrix.stem }}"
          tar -czf "dist/${{ matrix.archive }}" "${{ matrix.stem }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build/${{ matrix.bin }}" "${{ matrix.stem }}"
          Compress-Archive -Path "${{ matrix.stem }}" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.archive }}
