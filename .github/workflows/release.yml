name: Release

# Builds optimized, statically-linked binaries for each platform and attaches
# them to the GitHub Release. Release builds set FIFTEEN_STATIC_DEPS=ON, so
# raylib + openal-soft are compiled from source and linked statically (a
# self-contained, faster binary) — unlike the dynamic, system-package CI builds.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS, runner: macos-latest, preset: macos, bin: FifteenPuzzle, stem: FifteenPuzzle-macos-arm64, archive: FifteenPuzzle-macos-arm64.tar.gz }
          - { name: Linux, runner: ubuntu-latest, preset: linux, bin: FifteenPuzzle, stem: FifteenPuzzle-linux-x86_64, archive: FifteenPuzzle-linux-x86_64.tar.gz }
          - { name: Windows, runner: windows-latest, preset: windows, bin: FifteenPuzzle.exe, stem: FifteenPuzzle-windows-x86_64.exe, archive: FifteenPuzzle-windows-x86_64.zip }

    steps:
      - uses: actions/checkout@v7

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      # --- toolchains (deps are built from source, so no system raylib/openal) --
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install LLVM + libc++ + windowing deps (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          # libcurl is linked dynamically even in static builds (a from-source
          # static curl + TLS backend is out of scope); sqlite + json are
          # vendored from source by FIFTEEN_STATIC_DEPS.
          sudo apt-get install -y \
            clang-21 lld-21 libc++-21-dev libc++abi-21-dev libcurl4-openssl-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev

      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # libcurl is not in the Windows SDK; install it via vcpkg. The
      # x64-windows-static-md triplet links libcurl (and zlib) statically into
      # the exe while keeping the dynamic CRT (/MD) that matches the rest of the
      # build — so the released binary is self-contained (no libcurl.dll). curl
      # uses the system SChannel TLS backend, needing no extra libraries.
      - name: Install curl (vcpkg, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install curl --triplet x64-windows-static-md

      # --- build (static deps, Release) ----------------------------------------
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset macos -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset macos --target FifteenPuzzle FifteenServer

      - name: Build (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          json=""
          for cand in $(find /usr/lib/llvm-21 /usr/lib /usr/share -name libc++.modules.json 2>/dev/null); do
            sp="$(python3 -c 'import json,sys; m=[x for x in json.load(open(sys.argv[1])).get("modules",[]) if x.get("logical-name")=="std"]; print(m[0]["source-path"] if m else "")' "$cand")"
            [ -z "$sp" ] && continue
            case "$sp" in /*) abs="$sp" ;; *) abs="$(dirname "$cand")/$sp" ;; esac
            [ -f "$abs" ] && { json="$cand"; break; }
          done
          test -n "$json"
          cmake --preset linux -DCMAKE_CXX_STDLIB_MODULES_JSON="$json" -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON
          cmake --build --preset linux --target FifteenPuzzle FifteenServer

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake --preset windows -DCMAKE_BUILD_TYPE=Release -DFIFTEEN_STATIC_DEPS=ON -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          cmake --build --preset windows --target FifteenPuzzle FifteenServer

      # --- package + publish ----------------------------------------------------
      # Archive a stem-named directory holding the game client, the FifteenServer
      # binary, and Bootstrap/run-server.sh. Archiving (not a bare binary) keeps
      # the executable bit through download/extraction — a bare binary served over
      # HTTP loses its +x and macOS shows it as a "Document" that won't run; tar.gz
      # (and zip on Windows) preserve it.
      # macOS ships the game as a proper .app bundle (icon + itch-app launch),
      # with the server + its launcher alongside.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          stage="${{ matrix.stem }}"   # stem-named dir; keeps the archive naming scheme
          rm -rf "$stage" && mkdir -p "$stage"
          version="${{ github.event.release.tag_name || '0.0.0' }}"
          version="${version#v}"       # CFBundleShortVersionString wants no leading 'v'
          bash Bootstrap/make-macos-app.sh build/FifteenPuzzle Bootstrap/icon-1024.png \
            "$stage/FifteenPuzzle.app" "$version"
          cp "build/FifteenServer" "$stage/FifteenServer"
          cp "Bootstrap/run-server.sh" "$stage/run-server.sh"
          chmod +x "$stage/FifteenServer" "$stage/run-server.sh"
          # Ad-hoc code-sign: Apple Silicon refuses to run un-/inconsistently
          # signed bundles, which Gatekeeper reports as "damaged and can't be
          # opened" on a quarantined download. An ad-hoc signature (identity "-")
          # makes the bundle coherent so it runs — it's still un-notarized, so
          # first launch is right-click -> Open (or `xattr -dr
          # com.apple.quarantine`), not a hard block. (Notarization would need a
          # paid Apple Developer account.)
          codesign --force --deep --sign - "$stage/FifteenPuzzle.app"
          codesign --force --sign - "$stage/FifteenServer"
          codesign --verify --strict "$stage/FifteenPuzzle.app"
          tar -czf "dist/${{ matrix.archive }}" "$stage"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          stage="${{ matrix.stem }}"   # stem-named dir; keeps the archive naming scheme
          rm -rf "$stage" && mkdir -p "$stage"
          cp "build/${{ matrix.bin }}" "$stage/${{ matrix.bin }}"
          cp "build/FifteenServer" "$stage/FifteenServer"
          cp "Bootstrap/run-server.sh" "$stage/run-server.sh"
          chmod +x "$stage/${{ matrix.bin }}" "$stage/FifteenServer" "$stage/run-server.sh"
          tar -czf "dist/${{ matrix.archive }}" "$stage"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $stage = "${{ matrix.stem }}" -replace '\.exe$', ''   # a folder shouldn't be named *.exe
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "build/${{ matrix.bin }}" "$stage/${{ matrix.bin }}"
          Copy-Item "build/FifteenServer.exe" "$stage/FifteenServer.exe"
          Copy-Item "Bootstrap/run-server.sh" "$stage/run-server.sh"
          Compress-Archive -Path $stage -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.archive }}

  # Publish the built archives to itch.io via butler, one channel per platform.
  # Opt-in: set repo variables ITCH_USER + ITCH_GAME and the BUTLER_API_KEY
  # secret (Settings → Secrets and variables → Actions). Skipped otherwise.
  # Runs on one Linux runner (native butler), so it needs no per-OS butler.
  publish-itch:
    name: Publish to itch.io
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.ITCH_GAME != '' && (github.event_name == 'release' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Install butler
        run: |
          curl -sL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push channels
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          target="${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}"
          version="${{ github.event.release.tag_name || github.run_number }}"
          # Extract each platform archive to a folder and push it as its channel;
          # pushing the unpacked tree lets the itch app generate patches and run
          # the game (the .app on macOS) directly.
          publish() { # <archive-filename> <itch-channel>
            local file
            file="$(ls artifacts/*/"$1" 2>/dev/null | head -1 || true)"
            if [ -z "$file" ]; then
              echo "::warning::no artifact for channel $2 ($1)"; return
            fi
            rm -rf "stage-$2" && mkdir -p "stage-$2"
            case "$file" in
              *.zip)    unzip -q "$file" -d "stage-$2" ;;
              *.tar.gz) tar -xzf "$file" -C "stage-$2" ;;
            esac
            ./butler push "stage-$2" "$target:$2" --userversion "$version"
          }
          publish "FifteenPuzzle-macos-arm64.tar.gz"   osx
          publish "FifteenPuzzle-linux-x86_64.tar.gz"  linux
          publish "FifteenPuzzle-windows-x86_64.zip"   windows
