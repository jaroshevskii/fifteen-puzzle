name: Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      # Prebuilt deps for Windows via vcpkg (no system package exists). vcpkg
      # builds raylib + openal-soft once and stores binary packages; the binary
      # cache is persisted across runs, so repeat runs restore prebuilt binaries
      # instead of recompiling — the parity with brew/apt on macOS/Linux. (ccache
      # does not work here: MSVC compiles are 100% uncacheable in this setup.)
      # MSVC builds at C++23: CMake 4.2 supports neither the C++26 dialect nor
      # `import std` at C++26 for MSVC.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-x64-windows-${{ github.run_id }}
          restore-keys: vcpkg-x64-windows-

      - name: Install raylib + openal-soft (vcpkg)
        shell: pwsh
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install raylib openal-soft --triplet x64-windows

      - name: Configure / Build / Test
        shell: cmd
        run: |
          cmake --preset windows -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build --preset windows
          cmake --build --preset tests-windows
          ctest --preset windows
