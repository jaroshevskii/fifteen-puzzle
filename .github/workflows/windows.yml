name: Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      # No fast prebuilt raylib/openal package exists for Windows runners, so the
      # deps are built from source. ccache (content-hashed) caches those object
      # files across runs — robust where a path/mtime cache of build/_deps was
      # not (a fresh configure re-ran every compile). CMake picks ccache up as the
      # compiler launcher automatically. (MSVC builds at C++23: CMake 4.2 supports
      # neither the C++26 dialect nor `import std` at C++26 for MSVC.)
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: windows
          variant: ccache

      - name: Configure / Build / Test
        shell: cmd
        run: |
          cmake --preset windows
          cmake --build --preset windows
          cmake --build --preset tests-windows
          ctest --preset windows
