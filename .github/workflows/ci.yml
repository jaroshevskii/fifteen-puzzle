name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-15
            preset: macos
          - name: Linux
            runner: ubuntu-24.04
            preset: linux
          - name: Windows
            runner: windows-2022
            preset: windows

    steps:
      - uses: actions/checkout@v4

      # `import std;` is gated behind a CMake-version-specific UUID in
      # CMakeLists.txt, so the CMake version is pinned to match.
      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      # --- macOS: Homebrew LLVM (Apple Clang has no modules / import std) ------
      # raylib + openal-soft are installed as prebuilt bottles so `find_package`
      # uses them and we never compile the third-party sources.
      - name: Install LLVM + prebuilt deps (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm raylib openal-soft

      - name: Configure / Build / Test (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --preset macos
          cmake --build --preset macos
          cmake --build --preset tests   # tests are EXCLUDE_FROM_ALL
          ctest --preset macos

      # Linux/Windows have no prebuilt packages here, so dependencies are built
      # from source via FetchContent. Cache that subtree across runs.
      - name: Cache built dependencies (Linux/Windows)
        if: runner.os != 'macOS'
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-deps-

      # --- Linux: upstream LLVM + libc++ --------------------------------------
      - name: Install LLVM + libc++ + windowing deps (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y \
            clang-21 lld-21 libc++-21-dev libc++abi-21-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev

      - name: Configure / Build / Test (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          # Pick a libc++ module manifest whose std.cppm actually exists. The
          # Debian-packaged manifest under /usr/lib/x86_64-linux-gnu points at a
          # std.cppm path that isn't installed there; the llvm-21 toolchain's
          # manifest resolves correctly. Validate before trusting one.
          json=""
          for cand in $(find /usr/lib/llvm-21 /usr/lib /usr/share -name libc++.modules.json 2>/dev/null); do
            sp="$(python3 -c 'import json,sys; m=[x for x in json.load(open(sys.argv[1])).get("modules",[]) if x.get("logical-name")=="std"]; print(m[0]["source-path"] if m else "")' "$cand")"
            [ -z "$sp" ] && continue
            case "$sp" in /*) abs="$sp" ;; *) abs="$(dirname "$cand")/$sp" ;; esac
            [ -f "$abs" ] && { json="$cand"; break; }
          done
          echo "Using modules.json: ${json:-<none found>}"
          test -n "$json"
          cmake --preset linux -DCMAKE_CXX_STDLIB_MODULES_JSON="$json"
          cmake --build --preset linux
          cmake --build --preset tests-linux   # tests are EXCLUDE_FROM_ALL
          ctest --preset linux

      # --- Windows: MSVC (ships its own std module) ---------------------------
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure / Build / Test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake --preset windows
          cmake --build --preset windows
          cmake --build --preset tests-windows
          ctest --preset windows
