name: Package and Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '14.3.1'

      - name: Clean previous build artifacts
        run: |
          git clean -fdx

      - name: Build Release
        run: |
          set -e
          xcodebuild -scheme FifteenPuzzle -configuration Release

      - name: Prepare distribution folder
        run: |
          mkdir -p dist
          # macOS app bundle
          cp -R build/FifteenPuzzle.app dist/
          # iOS: uncomment if needed
          # cp -R build/Products/Release-iphoneos/FifteenPuzzle.ipa dist/

      - name: Create zip archive
        id: zip
        run: |
          VERSION=${{ github.event.release.tag_name }}
          zip -r "FifteenPuzzle-v$VERSION.zip" dist/*
          echo "archive=FifteenPuzzle-v$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Upload archive to Release assets
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: "${{ steps.zip.outputs.archive }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

