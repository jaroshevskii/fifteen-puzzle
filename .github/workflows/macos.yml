name: macOS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # `import std;` is gated behind a CMake-version-specific UUID, so pin CMake.
      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      # Prebuilt deps (find_package uses them; no third-party source build).
      # sqlite3 + libcurl ship in the macOS SDK; nlohmann-json comes from brew.
      - name: Install LLVM + deps
        run: brew install llvm raylib openal-soft nlohmann-json

      - name: Configure / Build / Test
        run: |
          cmake --preset macos
          cmake --build --preset macos
          cmake --build --preset tests   # tests are EXCLUDE_FROM_ALL
          ctest --preset macos

      # Boots the real server on scratch ports and drives the HTTP API + the
      # multiplayer TCP referee end-to-end (no sockets are mocked here).
      - name: End-to-end smoke test (server API + multiplayer)
        run: |
          cmake --build --preset macos --target FifteenServer
          python3 Bootstrap/e2e.py ./build/FifteenServer
