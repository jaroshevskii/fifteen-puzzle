name: Linux

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "4.2.3"
          ninjaVersion: "latest"

      - name: Install LLVM + libc++ + deps
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          # Toolchain, system audio lib, persistence/network/JSON libs, and
          # windowing dev libs.
          sudo apt-get install -y \
            clang-21 lld-21 libc++-21-dev libc++abi-21-dev \
            libopenal-dev libsqlite3-dev libcurl4-openssl-dev nlohmann-json3-dev \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev
          # Prebuilt raylib if packaged; otherwise it is built from source.
          sudo apt-get install -y libraylib-dev || echo "libraylib-dev unavailable; building raylib from source"

      # ccache (content-hashed) caches object files of any dependency built from
      # source across runs. CMake picks it up as the compiler launcher.
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux
          variant: ccache

      - name: Configure / Build / Test
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          # Pick a libc++ module manifest whose std.cppm actually exists.
          json=""
          for cand in $(find /usr/lib/llvm-21 /usr/lib /usr/share -name libc++.modules.json 2>/dev/null); do
            sp="$(python3 -c 'import json,sys; m=[x for x in json.load(open(sys.argv[1])).get("modules",[]) if x.get("logical-name")=="std"]; print(m[0]["source-path"] if m else "")' "$cand")"
            [ -z "$sp" ] && continue
            case "$sp" in /*) abs="$sp" ;; *) abs="$(dirname "$cand")/$sp" ;; esac
            [ -f "$abs" ] && { json="$cand"; break; }
          done
          echo "Using modules.json: ${json:-<none found>}"
          test -n "$json"
          cmake --preset linux -DCMAKE_CXX_STDLIB_MODULES_JSON="$json"
          cmake --build --preset linux
          cmake --build --preset tests-linux   # tests are EXCLUDE_FROM_ALL
          ctest --preset linux

      # Boots the real server on scratch ports and drives the HTTP API + the
      # multiplayer TCP referee end-to-end (no sockets are mocked here).
      - name: End-to-end smoke test (server API + multiplayer)
        env:
          CC: clang-21
          CXX: clang++-21
        run: |
          cmake --build --preset linux --target FifteenServer
          python3 Bootstrap/e2e.py ./build/FifteenServer
