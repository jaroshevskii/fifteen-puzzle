<svg width="1920" height="480" viewBox="0 0 1920 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Wide banner for the top of the itch.io page description. Renders to
       Bootstrap/banner.png. Same palette as the cover/icon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a10"/>
      <stop offset="0.55" stop-color="#150f26"/>
      <stop offset="1" stop-color="#271747"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.5" r="0.42">
      <stop offset="0" stop-color="#ffa100" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffa100" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc24d"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1920" height="480" fill="url(#bg)"/>
  <rect width="1920" height="480" fill="url(#glow)"/>

  <!-- confetti -->
  <g>
    <rect x="70"  y="70"  width="14" height="14" rx="3" fill="#ffa100" transform="rotate(20 77 77)"/>
    <rect x="300" y="46"  width="12" height="12" rx="3" fill="#7ad06b" transform="rotate(-15 306 52)"/>
    <rect x="150" y="410" width="12" height="12" rx="3" fill="#5fb0ff" transform="rotate(25 156 416)"/>
    <rect x="1180" y="60" width="12" height="12" rx="3" fill="#ff7ab0" transform="rotate(12 1186 66)"/>
    <rect x="980" y="420" width="12" height="12" rx="3" fill="#b98bff" transform="rotate(-18 986 426)"/>
  </g>

  <!-- trailing tiles drifting toward the wordmark (motion) -->
  <g opacity="0.16">
    <rect x="1120" y="150" width="180" height="180" rx="20" fill="#ffa100"/>
  </g>
  <g opacity="0.30">
    <rect x="1180" y="150" width="180" height="180" rx="20" fill="#ffa100"/>
  </g>

  <!-- hero board (right), tilted -->
  <g transform="translate(1430 84) rotate(-7 156 156)" filter="url(#soft)">
    <rect x="-18" y="-18" width="348" height="348" rx="28" fill="#5a1866"/>
    <rect x="-18" y="-18" width="348" height="348" rx="28" fill="none" stroke="#7e2790" stroke-width="2"/>
    <g font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="38" fill="#17131d" text-anchor="middle">
      <rect x="0"   y="0"   width="72" height="72" rx="12" fill="#ffa100"/><text x="36"  y="50">1</text>
      <rect x="80"  y="0"   width="72" height="72" rx="12" fill="#ffa100"/><text x="116" y="50">2</text>
      <rect x="160" y="0"   width="72" height="72" rx="12" fill="#ffa100"/><text x="196" y="50">3</text>
      <rect x="240" y="0"   width="72" height="72" rx="12" fill="#ffa100"/><text x="276" y="50">4</text>
      <rect x="0"   y="80"  width="72" height="72" rx="12" fill="#ffa100"/><text x="36"  y="130">5</text>
      <rect x="80"  y="80"  width="72" height="72" rx="12" fill="#ffa100"/><text x="116" y="130">6</text>
      <rect x="160" y="80"  width="72" height="72" rx="12" fill="#ffa100"/><text x="196" y="130">7</text>
      <rect x="240" y="80"  width="72" height="72" rx="12" fill="#ffa100"/><text x="276" y="130">8</text>
      <rect x="0"   y="160" width="72" height="72" rx="12" fill="#ffa100"/><text x="36"  y="210">9</text>
      <rect x="80"  y="160" width="72" height="72" rx="12" fill="#ffa100"/><text x="116" y="210">10</text>
      <rect x="160" y="160" width="72" height="72" rx="12" fill="#ffa100"/><text x="196" y="210">11</text>
      <rect x="240" y="160" width="72" height="72" rx="12" fill="#ffa100"/><text x="276" y="210">12</text>
      <rect x="0"   y="240" width="72" height="72" rx="12" fill="#ffa100"/><text x="36"  y="290">13</text>
      <rect x="80"  y="240" width="72" height="72" rx="12" fill="#ffa100"/><text x="116" y="290">14</text>
      <rect x="160" y="240" width="72" height="72" rx="12" fill="#4a1556"/>
      <rect x="240" y="240" width="72" height="72" rx="12" fill="#ffa100"/><text x="276" y="290">15</text>
    </g>
  </g>

  <!-- wordmark (left) -->
  <text x="96" y="268" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="210"
        fill="url(#title)" letter-spacing="-8">15</text>
  <text x="100" y="372" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="96"
        fill="#ffffff" letter-spacing="6">PUZZLE</text>
  <text x="104" y="424" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="26"
        fill="#b9a9d6" letter-spacing="8">SLIDE · RACE · WIN</text>
</svg>
