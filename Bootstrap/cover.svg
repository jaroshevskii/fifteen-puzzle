<svg width="630" height="500" viewBox="0 0 630 500" xmlns="http://www.w3.org/2000/svg">
  <!-- itch.io cover (630x500). Editable source; render to Bootstrap/cover.png. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a10"/>
      <stop offset="0.55" stop-color="#141026"/>
      <stop offset="1" stop-color="#241640"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffa100" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffa100" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc24d"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="630" height="500" fill="url(#bg)"/>
  <rect width="630" height="500" fill="url(#glow)"/>

  <!-- scattered confetti (victory / multiplayer flair) -->
  <g opacity="0.9">
    <rect x="40" y="60" width="12" height="12" rx="2" fill="#ffa100" transform="rotate(20 46 66)"/>
    <rect x="120" y="40" width="10" height="10" rx="2" fill="#7ad06b" transform="rotate(-15 125 45)"/>
    <rect x="250" y="52" width="9" height="9" rx="2" fill="#5fb0ff" transform="rotate(30 254 56)"/>
    <rect x="300" y="30" width="11" height="11" rx="2" fill="#ff7ab0" transform="rotate(12 305 35)"/>
    <rect x="70" y="430" width="10" height="10" rx="2" fill="#b98bff" transform="rotate(24 75 435)"/>
    <rect x="180" y="452" width="9" height="9" rx="2" fill="#ffa100" transform="rotate(-20 184 456)"/>
    <rect x="590" y="70" width="10" height="10" rx="2" fill="#7ad06b" transform="rotate(18 595 75)"/>
  </g>

  <!-- ============ hero board (right), tilted for energy ============ -->
  <g transform="translate(338 96) rotate(-7 144 144)" filter="url(#soft)">
    <!-- board panel -->
    <rect x="-18" y="-18" width="324" height="324" rx="26" fill="#5a1866"/>
    <rect x="-18" y="-18" width="324" height="324" rx="26" fill="none" stroke="#7e2790" stroke-width="2"/>

    <!-- row 0: 1 2 3 4 -->
    <g font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="34" fill="#17131d" text-anchor="middle">
      <rect x="0"   y="0"   width="66" height="66" rx="12" fill="#ffa100"/><text x="33"  y="45">1</text>
      <rect x="74"  y="0"   width="66" height="66" rx="12" fill="#ffa100"/><text x="107" y="45">2</text>
      <rect x="148" y="0"   width="66" height="66" rx="12" fill="#ffa100"/><text x="181" y="45">3</text>
      <rect x="222" y="0"   width="66" height="66" rx="12" fill="#ffa100"/><text x="255" y="45">4</text>
      <!-- row 1: 5 6 7 8 -->
      <rect x="0"   y="74"  width="66" height="66" rx="12" fill="#ffa100"/><text x="33"  y="119">5</text>
      <rect x="74"  y="74"  width="66" height="66" rx="12" fill="#ffa100"/><text x="107" y="119">6</text>
      <rect x="148" y="74"  width="66" height="66" rx="12" fill="#ffa100"/><text x="181" y="119">7</text>
      <rect x="222" y="74"  width="66" height="66" rx="12" fill="#ffa100"/><text x="255" y="119">8</text>
      <!-- row 2: 9 10 11 12 -->
      <rect x="0"   y="148" width="66" height="66" rx="12" fill="#ffa100"/><text x="33"  y="193">9</text>
      <rect x="74"  y="148" width="66" height="66" rx="12" fill="#ffa100"/><text x="107" y="193">10</text>
      <rect x="148" y="148" width="66" height="66" rx="12" fill="#ffa100"/><text x="181" y="193">11</text>
      <rect x="222" y="148" width="66" height="66" rx="12" fill="#ffa100"/><text x="255" y="193">12</text>
      <!-- row 3: 13 14 [empty] and 15 sliding in from the right -->
      <rect x="0"   y="222" width="66" height="66" rx="12" fill="#ffa100"/><text x="33"  y="267">13</text>
      <rect x="74"  y="222" width="66" height="66" rx="12" fill="#ffa100"/><text x="107" y="267">14</text>
      <rect x="148" y="222" width="66" height="66" rx="12" fill="#4a1556"/>  <!-- empty slot -->
      <!-- motion trail for the sliding 15 -->
      <rect x="200" y="222" width="66" height="66" rx="12" fill="#ffa100" opacity="0.22"/>
      <rect x="211" y="222" width="66" height="66" rx="12" fill="#ffa100" opacity="0.4"/>
      <rect x="222" y="222" width="66" height="66" rx="12" fill="#ffa100"/><text x="255" y="267">15</text>
    </g>
  </g>

  <!-- ============ wordmark (left) ============ -->
  <text x="46" y="232" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="168"
        fill="url(#title)" letter-spacing="-6">15</text>
  <text x="50" y="300" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="72"
        fill="#ffffff" letter-spacing="4">PUZZLE</text>
  <text x="52" y="342" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="20"
        fill="#b9a9d6" letter-spacing="6">SLIDE · RACE · WIN</text>

  <!-- feature chips: stacked in the left column so they never reach the board,
       each sized to comfortably hold its (left-aligned) label -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="14" fill="#e9e2f7">
    <rect x="50" y="380" width="232" height="32" rx="16" fill="#ffffff" fill-opacity="0.08"
          stroke="#ffa100" stroke-opacity="0.55"/>
    <text x="68" y="401">ONLINE MULTIPLAYER</text>
    <rect x="50" y="422" width="170" height="32" rx="16" fill="#ffffff" fill-opacity="0.08"
          stroke="#7e2790" stroke-opacity="0.8"/>
    <text x="68" y="443">LEADERBOARDS</text>
  </g>
</svg>
